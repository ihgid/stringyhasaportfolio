    <script>
      const posts = {
        "solidify-k12": {
          title: "Solidify K12: Interactive CAD for Education",
          date: "August 5, 2026",
          content: `
            <p>Bringing CAD to younger students requires an intuitive interface that doesn't overwhelm them with complex operations. Solidify K12 is a project aimed at creating a simplified, web-based 3D modeling tool tailored for K-12 education.</p>
            <p>By focusing on basic boolean operations (union, difference, intersection) with primitive shapes, students can learn spatial reasoning and geometry in a fun, interactive environment without a steep learning curve.</p>
            <p>The project is built on modern web technologies to ensure it runs smoothly on Chromebooks and other low-power devices commonly used in schools.</p>
          `
        },
        "finetuning-brep": {
          title: "Finetuning ML Models for B-rep CAD Generation",
          date: "July 10, 2026",
          content: `
            <p>Boundary Representation (B-rep) is the de facto standard for modeling 3D objects in modern CAD systems. However, generating valid B-rep models using Machine Learning remains a significant challenge due to the complex topological constraints required to form a water-tight solid.</p>
            <p>Recently, I've been exploring how we can adapt large generative models and finetune them to output structured B-rep data. By utilizing sequence-to-sequence architectures and masking out invalid topological connections during generation, we can drastically improve the validity of the generated geometries.</p>
            <p>The architecture involves tokenizing the faces, edges, and vertices directly from STEP files, and training a transformer to predict bounding loops autoregressively. This required a custom loss function that heavily penalizes non-manifold outputs. The results so far have been incredibly promising, reducing invalid topologies by 40% compared to standard baselines.</p>
            <p>I will be uploading the dataset and the open-source checkpoints to HuggingFace soon, along with a detailed breakdown of the inference pipeline. Stay tuned!</p>
          `
        },
        "prosthetics-blender": {
          title: "Accessible 3D Models: Designing Prosthetics in Blender",
          date: "June 20, 2026",
          content: `
            <p>Prosthetic design usually requires expensive proprietary software. By leveraging Blender, an open-source 3D creation suite, we can dramatically lower the barrier to entry for developing custom-fitted prosthetics.</p>
            <p>Using a combination of Python scripting within Blender and subdivision surface modeling, I created a workflow that allows for rapid customization of prosthetic sockets. This workflow can take 3D scan data and automatically conform the base mesh to the patient's unique topology.</p>
            <p>To achieve this, I wrote an add-on that uses the Shrinkwrap modifier driven by vertex groups. The user simply imports the 3D scan, aligns it, and clicks a button to generate the foundational socket. From there, boolean operations are used to attach the standard pylon hardware.</p>
            <p>This workflow means that small clinics in developing nations can iterate on designs using completely free software before sending the files to a local 3D printer.</p>
          `
        }
      };

      const urlParams = new URLSearchParams(window.location.search);
      const postId = urlParams.get('id');

      if (postId && posts[postId]) {
        const post = posts[postId];

        document.getElementById('post-meta').textContent = post.date;
        document.getElementById('post-content').innerHTML = post.content;
        document.title = post.title + " - Pravakar Bogati";
        // Optionally update the URL to look prettier (e.g. replacing ?id=... with a clean path if using a proper server)
        // window.history.replaceState({}, '', '/' + postId);
      } else {

      }
