    <main class="blog-post-main">
      <a href="/publications" class="back-link">&larr; Back to Publications</a>
      <img id="post-hero" style="display: none; width: 100%; aspect-ratio: 16 / 9; max-height: 400px; object-fit: cover; border-radius: 1rem; margin-bottom: 2rem;" />
      <h1 class="blog-title" id="post-title">Loading...</h1>

      </div>
    </main>

    <footer>
      <p>Copyright &#169; 2024 Pravakar Bogati. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
      const posts = {
        "Cad Agent": {
          title: "Finetuning LLMs for CAD Generation",
          date: "July 10, 2026",
          image: "./assets/projectthumbnails/blog2-ml.png",
          description: "Finetuning open LLM models to improve their ability to generate code that directly outputs .step files.",
          tags: ["#MachineLearning", "#AI", "#CAD", "#CodeGeneration", "#LLM"],
          content: `
            <p>Boundary Representation (B-rep) is the de facto standard for modeling 3D objects in modern CAD systems. However, generating valid B-rep models using Machine Learning remains a significant challenge due to the complex topological constraints required to form a water-tight solid.</p>
            <p>To address this, we have finetuned open LLM models to make them better at generating code that directly creates .step files. This code generation capability is the main use case of the project.</p>
            <p>The results so far have been incredibly promising. Right now, it can successfully recreate 60% of engineering shapes, excluding B-splines and surface modeling.</p>
            <p>Please note that while it is built on top of open models, the CAD Agent itself is a proprietary software. Stay tuned for more updates!</p>
          `
        },
        "solidify-k12": {
          title: "Interactive CAD for KG-12 Students",
          date: "May 10, 2026",
          image: "./assets/projectthumbnails/blog1-k12.png",
          description: "A project aimed at creating a simplified, web-based 3D modeling tool tailored for K-12 education.",
          tags: ["#CAD", "#EdTech", "#3DModeling", "#Education", "#Engineering"],
          content: `
            <p>Bringing CAD to younger students requires an intuitive interface that doesn't overwhelm them with complex operations. Solidify K12 is a project aimed at creating a simplified 3D modeling tool tailored for K-12 education.</p>
            <p>By focusing on basic boolean operations (union, difference, intersection) with primitive shapes, students can learn spatial reasoning and geometry in a fun, interactive environment without a steep learning curve.</p>
            <p>The project is built to ensure it runs well on older computers, offering both a web version and a standalone .exe application. Please note that Solidify K12 is a proprietary software.</p>
          `
        },
        "prosthetics-blender": {
          title: "Plugin for Easy Prosthetics Design",
          date: "February 20, 2026",
          image: "./assets/projectthumbnails/blog3-blender.png",
          description: "Leveraging Blender and Python scripting to lower the barrier to entry for developing custom-fitted prosthetics.",
          tags: ["#3DModeling", "#Blender", "#Prosthetics", "#Python", "#HealthcareTech"],
          content: `
            <p>Prosthetic design usually requires expensive proprietary software. By leveraging Blender, an open-source 3D creation suite, we can dramatically lower the barrier to entry for developing custom-fitted prosthetics.</p>
            <p>Using a combination of Python scripting within Blender, We developed a plugin to make prosthetic modeling easy. This workflow can take 3D scan data and automatically conform the base mesh to the patient's unique topology.</p>
            <p>The plugin drastically simplifies stump modeling with an easy mode and includes preset stumps categorized for various age groups. The user simply imports the 3D scan, aligns it, and clicks a button to generate the foundational socket.</p>
            <p>This workflow means that small clinics in developing nations can iterate on designs using completely free software before sending the files to a local 3D printer.</p>
          `
        }
      };

      const urlParams = new URLSearchParams(window.location.search);
      const postId = urlParams.get('id');

      if (postId && posts[postId]) {
        const post = posts[postId];
        document.getElementById('post-title').textContent = post.title;
        document.getElementById('post-meta').textContent = post.date;
        
        let tagsHtml = "";
        if (post.tags) {
          tagsHtml = '<div style="margin-top: 3rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">' + 
            post.tags.map(tag => `<span style="color: #007bff; font-weight: 500; font-size: 0.9rem; background: #f0f8ff; padding: 0.2rem 0.6rem; border-radius: 1rem;">${tag}</span>`).join('') + 
            '</div>';
        }
        document.getElementById('post-content').innerHTML = post.content + tagsHtml;
        
        if (post.image) {
          const hero = document.getElementById('post-hero');
          hero.src = post.image;
          hero.style.display = 'block';
        }

        document.title = post.title + " - Pravakar Bogati";

        // SEO & Schema.org JSON-LD for AI Search & Indexing
        const metaDesc = document.createElement('meta');
        metaDesc.name = "description";
        metaDesc.content = post.description || post.title;
        document.head.appendChild(metaDesc);

        if (post.tags) {
          const metaKeywords = document.createElement('meta');
          metaKeywords.name = "keywords";
          metaKeywords.content = post.tags.map(t => t.replace('#', '')).join(', ');
          document.head.appendChild(metaKeywords);
        }

        const jsonLd = {
          "@context": "https://schema.org",
          "@type": "BlogPosting",
          "headline": post.title,
          "image": post.image ? [window.location.origin + post.image.replace('./', '/')] : [],
          "datePublished": new Date(post.date).toISOString(),
          "description": post.description || post.title,
          "author": [{
              "@type": "Person",
              "name": "Pravakar Bogati",
              "url": window.location.origin
          }]
        };
        const script = document.createElement('script');
        script.type = 'application/ld+json';
        script.text = JSON.stringify(jsonLd);
        document.head.appendChild(script);

        // Optionally update the URL to look prettier (e.g. replacing ?id=... with a clean path if using a proper server)
        // window.history.replaceState({}, '', '/' + postId);
      } else {
        document.getElementById('post-title').textContent = "Post Not Found";
        document.getElementById('post-content').innerHTML = "<p>Sorry, the post you are looking for does not exist.</p>";
      }
    </script>
  </body>
